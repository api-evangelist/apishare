      - url: https://www.apishare.cloud/documentation-1.12
        type: Documentation
      - url: https://www.apishare.cloud/documentation-1.12
        type: GettingStarted
      - url: https://www.apishare.cloud/pricing
        type: Pricing
    description: >-
      ApiShare provides a unified catalog of APIs, applications, assets, MCP servers,
      and AI agents with role-based visibility, configurable lifecycle workflows,
      subscription management, and built-in auditability. It integrates with API
      gateways (Boomi, Red Hat 3scale, Azure, Kong) and identity providers (Azure
      Entra ID, KeyCloak, Oracle Access Management) without replacing existing systems.
common:
  - type: Documentation
